<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViBe - 화상 회의</title>
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login-container" class="screen-container active">
        <div class="login-box">
            <h1>🎤 ViBe</h1>
            <p class="subtitle">화상 회의 플랫폼</p>
            
            <form id="login-form">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="이름을 입력하세요"
                        required
                        title="이름을 입력해주세요"
                    >
                </div>
                <div class="form-group">
                    <input 
                        type="text" 
                        id="room-id" 
                        placeholder="회의 ID (자동 생성)"
                        readonly
                    >
                    <button type="button" id="generate-room-btn" class="btn-secondary">
                        새로 생성
                    </button>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">
                    강의실 생성
                </button>
            </form>

            <div class="divider">또는</div>

            <div class="form-group">
                <input 
                    type="text" 
                    id="join-room-id" 
                    placeholder="기존 회의 ID 입력"
                >
                <button type="button" id="join-room-btn" class="btn-secondary">
                    참여
                </button>
            </div>
        </div>
    </div>

    <div id="conference-container" class="screen-container">
        <div class="conference-layout">
            <!-- 비디오 그리드 -->
            <div class="video-grid">
                <div id="local-video-container" class="video-tile local">
                    <video id="local-video" autoplay muted playsinline></video>
                    <div class="video-label">
                        <span id="local-username">나 (로컬)</span>
                        <button id="username-menu-btn" class="username-menu-btn" title="이름 관리">...</button>
                        <div id="username-menu" class="username-menu" style="display: none;">
                            <button class="menu-item" id="rename-username-btn">이름 변경하기</button>
                        </div>
                        <div id="instructor-badge-container" class="instructor-badge-container" style="display: none;">
                            <span class="instructor-badge">강의자</span>
                        </div>
                    </div>
                    <div class="video-controls">
                        <button id="toggle-video-btn" class="control-btn" title="카메라 켜기/끄기">
                            <span class="icon">📹</span>
                        </button>
                        <button id="toggle-audio-btn" class="control-btn" title="마이크 켜기/끄기">
                            <span class="icon">🎤</span>
                        </button>
                    </div>
                </div>

                <div id="remote-videos-container" class="video-grid"></div>
            </div>

            <!-- 화면 공유 영역 -->
            <div id="screen-share-container" class="screen-share-area" style="display: none;">
                <div class="screen-share-header">
                    <span id="screen-share-user-name"></span> 화면 공유 중
                    <button id="close-screen-share-btn" class="btn-close">✕</button>
                </div>
                <video id="screen-share-video" autoplay playsinline></video>
            </div>

            <!-- 사이드바 (채팅 & 참여자) -->
            <div class="sidebar">
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="participants">
                        👥 참여자 (<span id="participant-count">1</span>)
                    </button>
                    <button class="tab-btn" data-tab="chat">
                        💬 채팅
                    </button>
                    <button class="tab-btn" data-tab="quiz">
                        ❓ 퀴즈
                    </button>
                </div>

                <!-- 참여자 탭 -->
                <div id="participants-tab" class="tab-content active">
                    <!-- ✅ 강의실 코드 표시 -->
                    <div id="room-info" class="room-info" style="display: none;">
                        <div class="room-id-display">
                            <span class="room-id-label">방 ID:</span>
                            <span id="current-room-id"></span>
                            <button id="copy-room-code-btn" class="copy-btn" title="코드 복사">📋</button>
                        </div>
                    </div>

                    <div id="participants-list"></div>
                    <!-- ✅ 익명화 버튼 추가 -->
                    <button id="anonymize-btn" class="anonymize-btn" style="display: none;">
                        🎭 익명화
                    </button>
                </div>

                <!-- 채팅 탭 -->
                <div id="chat-tab" class="tab-content">
                    <div id="chat-messages" class="chat-messages"></div>
                    
                    <!-- 질문 다듬기 제안 영역 -->
                    <div id="suggestion-area" class="suggestion-area" style="display: none;">
                        <div class="suggestion-header">✨ 논리적으로 정리된 질문</div>
                        <div id="suggestion-text" class="suggestion-text"></div>
                        <div class="suggestion-buttons">
                            <button id="accept-suggestion-btn" class="btn-suggest accept">이 질문으로 보내기</button>
                            <button id="reject-suggestion-btn" class="btn-suggest reject">다시 작성</button>
                        </div>
                    </div>
                    
                    <div id="image-preview-area" class="image-preview-area" style="display: none;">
                        <img id="preview-image" class="preview-image" />
                        <button id="remove-image-btn" class="btn-remove-image">✕</button>
                    </div>
                    <div class="chat-input-area">
                        <input 
                            type="text" 
                            id="chat-message-input" 
                            placeholder="메시지 입력..."
                        >
                        <input 
                            type="file" 
                            id="file-input" 
                            accept="image/*" 
                            style="display: none;"
                        >
                        <button id="attach-file-btn" class="btn-attach-file" title="파일 첨부">
                            &#x1F5BC;
                        </button>
                        <button id="refine-question-btn" class="btn-refine" title="질문 다듬기">
                            ✨
                        </button>
                        <button id="send-message-btn" class="btn-primary">
                            전송
                        </button>
                    </div>
                </div>

                <!-- 퀴즈 탭 -->
                <div id="quiz-tab" class="tab-content">
                    <div id="quiz-container">
                        <!-- 강의자 입력 영역 (강의자만 보임) -->
                        <div id="quiz-creator-section" class="quiz-section" style="display: none;">
                            <h3>❓ 퀴즈 출제</h3>
                            <div class="quiz-input-group">
                                <input 
                                    type="text" 
                                    id="quiz-question-input" 
                                    placeholder="O, X 퀴즈 문제를 입력하세요"
                                    maxlength="200"
                                >
                                <button id="submit-quiz-btn" class="btn-primary quiz-btn">출제</button>
                            </div>
                        </div>

                        <!-- 현재 퀴즈 표시 영역 -->
                        <div id="current-quiz-display" class="quiz-display" style="display: none;">
                            <div class="quiz-question-area">
                                <p id="quiz-question-text" class="quiz-question"></p>
                                <div id="quiz-buttons-area" class="quiz-buttons">
                                    <button id="quiz-o-btn" class="quiz-btn quiz-option-btn">⭕ O</button>
                                    <button id="quiz-x-btn" class="quiz-btn quiz-option-btn">❌ X</button>
                                </div>
                            </div>
                            <div id="student-response-status" class="student-response-status">
                                ⏳ 응답 대기 중...
                            </div>
                            <!-- 강의자용 결과보기 버튼 -->
                            <div id="instructor-result-button-area" class="instructor-result-button-area" style="display: none; padding-top: 12px;">
                                <button id="show-quiz-results-btn" class="btn-primary quiz-btn">📊 결과보기</button>
                            </div>
                        </div>

                        <!-- 강의자용 결과 표시 영역 -->
                        <div id="quiz-results-section" class="quiz-results" style="display: none;">
                            <h3>📊 퀴즈 결과</h3>
                            <div class="quiz-result-item">
                                <div class="result-label">⭕ O를 선택</div>
                                <div class="result-bar">
                                    <div id="result-o-bar" class="result-fill" style="width: 0%"></div>
                                </div>
                                <div class="result-count"><span id="result-o-count">0</span>명</div>
                            </div>
                            <div class="quiz-result-item">
                                <div class="result-label">❌ X를 선택</div>
                                <div class="result-bar">
                                    <div id="result-x-bar" class="result-fill" style="width: 0%"></div>
                                </div>
                                <div class="result-count"><span id="result-x-count">0</span>명</div>
                            </div>
                            <button id="close-quiz-btn" class="btn-secondary quiz-btn">다음 퀴즈</button>
                        </div>

                        <!-- 퀴즈 없음 상태 -->
                        <div id="no-quiz-message" class="quiz-empty-state">
                            <p>아직 출제된 퀴즈가 없습니다.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 제어 바 -->
            <div class="control-bar">
                <button id="screen-share-btn" class="control-btn large" title="화면 공유">
                    <span class="icon">🖥️</span>
                    <span class="label">화면 공유</span>
                </button>
                <button id="toggle-sidebar-btn" class="control-btn large" title="채팅/참여자 토글">
                    <span class="icon">💬</span>
                    <span class="label">채팅</span>
                </button>
                <button id="settings-btn" class="control-btn large" title="설정">
                    <span class="icon">⚙️</span>
                    <span class="label">설정</span>
                </button>
                <button id="leave-btn" class="control-btn large danger" title="회의 나가기">
                    <span class="label">나가기</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 이미지 확대 보기 모달 -->
    <div id="image-modal" class="image-modal" style="display: none;">
        <div class="image-modal-content">
            <button id="close-image-modal-btn" class="close-modal-btn">&times;</button>
            <img id="modal-image" class="modal-image" />
        </div>
    </div>

    <!-- 알림 영역 -->
    <div id="notification-area"></div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="client.js"></script>
</body>
</html>
