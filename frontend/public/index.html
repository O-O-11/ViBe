<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViBe - 화상 회의</title>
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login-container" class="screen-container active">
        <div class="login-box">
            <h1>🎤 ViBe</h1>
            <p class="subtitle">화상 회의 플랫폼</p>
            
            <form id="login-form">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="이름을 입력하세요"
                        required
                    >
                </div>
                <div class="form-group">
                    <input 
                        type="text" 
                        id="room-id" 
                        placeholder="회의 ID (자동 생성)"
                        readonly
                    >
                    <button type="button" id="generate-room-btn" class="btn-secondary">
                        새로 생성
                    </button>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">
                    강의실 생성
                </button>
            </form>

            <div class="divider">또는</div>

            <div class="form-group">
                <input 
                    type="text" 
                    id="join-room-id" 
                    placeholder="기존 회의 ID 입력"
                >
                <button type="button" id="join-room-btn" class="btn-secondary">
                    참여
                </button>
            </div>
        </div>
    </div>

    <div id="conference-container" class="screen-container">
        <div class="conference-layout">
            <!-- 비디오 그리드 -->
            <div class="video-grid">
                <div id="local-video-container" class="video-tile local">
                    <video id="local-video" autoplay muted playsinline></video>
                    <div class="video-label">
                        <span id="local-username">나 (로컬)</span>
                        <button id="username-menu-btn" class="username-menu-btn" title="이름 관리">...</button>
                        <div id="username-menu" class="username-menu" style="display: none;">
                            <button class="menu-item" id="rename-username-btn">이름 변경하기</button>
                        </div>
                        <div id="instructor-badge-container" class="instructor-badge-container" style="display: none;">
                            <span class="instructor-badge">강의자</span>
                        </div>
                    </div>
                    <div class="video-controls">
                        <button id="toggle-video-btn" class="control-btn" title="카메라 켜기/끄기">
                            <span class="icon">📹</span>
                        </button>
                        <button id="toggle-audio-btn" class="control-btn" title="마이크 켜기/끄기">
                            <span class="icon">🎤</span>
                        </button>
                    </div>
                </div>

                <div id="remote-videos-container"></div>
            </div>

            <!-- 화면 공유 영역 -->
            <div id="screen-share-container" class="screen-share-area" style="display: none;">
                <div class="screen-share-header">
                    <span id="screen-share-user-name"></span> 화면 공유 중
                    <button id="close-screen-share-btn" class="btn-close">✕</button>
                </div>
                <video id="screen-share-video" autoplay playsinline></video>
            </div>

            <!-- 사이드바 (채팅 & 참여자) -->
            <div class="sidebar">
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="participants">
                        👥 참여자 (<span id="participant-count">1</span>)
                    </button>
                    <button class="tab-btn" data-tab="chat">
                        💬 채팅
                    </button>
                </div>

                <!-- 참여자 탭 -->
                <div id="participants-tab" class="tab-content active">
                    <div id="participants-list"></div>
                </div>

                <!-- 채팅 탭 -->
                <div id="chat-tab" class="tab-content">
                    <div id="chat-messages" class="chat-messages"></div>
                    
                    <!-- 질문 다듬기 제안 영역 -->
                    <div id="suggestion-area" class="suggestion-area" style="display: none;">
                        <div class="suggestion-header">✨ 논리적으로 정리된 질문</div>
                        <div id="suggestion-text" class="suggestion-text"></div>
                        <div class="suggestion-buttons">
                            <button id="accept-suggestion-btn" class="btn-suggest accept">이 질문으로 보내기</button>
                            <button id="reject-suggestion-btn" class="btn-suggest reject">다시 작성</button>
                        </div>
                    </div>
                    
                    <div id="image-preview-area" class="image-preview-area" style="display: none;">
                        <img id="preview-image" class="preview-image" />
                        <button id="remove-image-btn" class="btn-remove-image">✕</button>
                    </div>
                    <div class="chat-input-area">
                        <input 
                            type="text" 
                            id="chat-message-input" 
                            placeholder="메시지 입력..."
                        >
                        <input 
                            type="file" 
                            id="file-input" 
                            accept="image/*" 
                            style="display: none;"
                        >
                        <button id="attach-file-btn" class="btn-attach-file" title="파일 첨부">
                            �️
                        </button>
                        <button id="refine-question-btn" class="btn-refine" title="질문 다듬기">
                            ✨
                        </button>
                        <button id="send-message-btn" class="btn-primary">
                            전송
                        </button>
                    </div>
                </div>
            </div>

            <!-- 제어 바 -->
            <div class="control-bar">
                <button id="screen-share-btn" class="control-btn large" title="화면 공유">
                    <span class="icon">🖥️</span>
                    <span class="label">화면 공유</span>
                </button>
                <button id="toggle-sidebar-btn" class="control-btn large" title="채팅/참여자 토글">
                    <span class="icon">💬</span>
                    <span class="label">채팅</span>
                </button>
                <button id="settings-btn" class="control-btn large" title="설정">
                    <span class="icon">⚙️</span>
                    <span class="label">설정</span>
                </button>
                <button id="leave-btn" class="control-btn large danger" title="회의 나가기">
                    <span class="label">나가기</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 이미지 확대 보기 모달 -->
    <div id="image-modal" class="image-modal" style="display: none;">
        <div class="image-modal-content">
            <button id="close-image-modal-btn" class="close-modal-btn">&times;</button>
            <img id="modal-image" class="modal-image" />
        </div>
    </div>

    <!-- 알림 영역 -->
    <div id="notification-area"></div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="client.js"></script>
</body>
</html>
